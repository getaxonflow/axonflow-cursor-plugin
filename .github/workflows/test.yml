name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AXONFLOW_TELEMETRY: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check shell script syntax
        run: |
          for f in scripts/*.sh tests/*.sh tests/e2e/*.sh; do
            bash -n "$f" && echo "✓ $f" || exit 1
          done

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh tests/test-hooks.sh || true

      - name: Validate plugin structure
        run: |
          test -f .cursor-plugin/plugin.json || (echo "Missing plugin.json" && exit 1)
          test -f mcp.json || (echo "Missing mcp.json" && exit 1)
          test -f hooks/hooks.json || (echo "Missing hooks.json" && exit 1)
          test -f LICENSE || (echo "Missing LICENSE" && exit 1)
          echo "Plugin structure valid"

      - name: Run mcp.json ↔ plugin.json version-alignment gate (#2943)
        run: bash tests/test-mcp-json-alignment.sh

      - name: Run hook regression tests (mock server)
        run: bash tests/test-hooks.sh

      - name: Run per-user token resolver unit test (X-User-Token, #2943)
        run: bash tests/test-user-token.sh

      - name: Run X-User-Token hook-wire test (#2943)
        run: bash tests/test-user-token-header-wire.sh

      - name: Run upgrade-prompt envelope-handler unit tests
        run: bash tests/test-upgrade-prompt.sh

      - name: Run auth-failure (HTTP 401) throttle unit tests
        run: bash tests/test-auth-failure.sh

      - name: Run skill-content assertion (axonflow-status prefers local)
        run: bash tests/test-skill-status-prefers-local.sh

      - name: Run status-output terminology assertion (client_id label)
        run: bash tests/test-status-client-id-label.sh

      - name: Run V1 paid-tier wireup runtime test (X-License-Token + recovery)
        run: bash tests/e2e/runtime-license-token-and-recovery.sh
