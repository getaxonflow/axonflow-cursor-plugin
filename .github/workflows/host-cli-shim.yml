name: Host-CLI Shim

# Higher-fidelity host-CLI smoke than test-hooks.sh / install-smoke.
#
# Stages the plugin payload as Cursor would, parses the manifests
# (.cursor-plugin/plugin.json, hooks/hooks.json, mcp.json), and drives
# the discovered hook scripts through Cursor's JSON-on-stdin contract
# in lifecycle order (preToolUse → tool → postToolUse). Captures every
# agent request via a stdlib HTTP stub and asserts the X-License-Token
# forwarding contract across Free / Pro-env / Pro-file scenarios + the
# preToolUse-deny path (exit 2 + stderr).
#
# What this catches that the existing tests don't:
#   - Manifest-driven hook discovery breaking (rename a script but forget
#     hooks.json)
#   - Lifecycle ordering regressions (postToolUse running without
#     preToolUse first)
#   - X-License-Token not reaching the wire when it should (Pro tier
#     silent regression)
#   - mcp.json's headersHelper missing or dropping X-License-Token
#     (cursor#43 — currently XFAIL)

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - '.cursor-plugin/**'
      - 'mcp.json'
      - 'tests/host-cli-shim/**'
      - '.github/workflows/host-cli-shim.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - '.cursor-plugin/**'
      - 'mcp.json'
      - 'tests/host-cli-shim/**'
      - '.github/workflows/host-cli-shim.yml'

permissions:
  contents: read

concurrency:
  group: host-cli-shim-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shim:
    name: Host-CLI shim
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      AXONFLOW_TELEMETRY: 'off'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run host-CLI shim
        run: bash tests/host-cli-shim/run.sh
