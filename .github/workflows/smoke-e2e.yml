name: Smoke E2E

# Runs the install-and-use smoke scenario against a live AxonFlow stack.
# Requires a reachable stack + demo credentials that GitHub-hosted
# runners cannot provide by default, so we only trigger manually via
# workflow_dispatch. Operators supply the endpoint as an input. For PR
# smoke gating, run against a self-hosted runner with a local stack or
# trigger manually after merge. Full plugin batch matrix lives in
# axonflow-enterprise/tests/e2e/plugin-batch-1/.

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: AxonFlow agent endpoint (defaults to localhost:8080)
        required: false
        default: http://localhost:8080

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke — block context
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      AXONFLOW_TELEMETRY: "off"
      AXONFLOW_ENDPOINT: ${{ github.event.inputs.endpoint || 'http://localhost:8080' }}
      AXONFLOW_CLIENT_ID: demo-client
      AXONFLOW_CLIENT_SECRET: demo-secret

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Run smoke scenario
        run: |
          chmod +x tests/e2e/smoke-block-context.sh scripts/*.sh
          bash tests/e2e/smoke-block-context.sh
